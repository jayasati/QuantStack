name: quantstack

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quantstack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantstack}
      POSTGRES_DB: quantstack
    # postgres:16-alpine's own out-of-box defaults (shared_buffers=128MB,
    # effective_cache_size=4GB, work_mem=4MB) are sized for a tiny/default
    # container, not this workload -- found live (2026-07-14) at
    # feature_store's real ~561k-row scale, with app-level connection
    # pooling already tuned (database_pool_size/max_overflow,
    # candidates.py's MAX_CONCURRENT_SNAPSHOT_CAPTURES semaphore). These
    # are moderate values, not maxed for the VM's full 15GB/4vCPU (this
    # compose file is also used for local dev) -- shared_buffers ~25% and
    # effective_cache_size ~50-60% of a conservative 2GB assumption,
    # work_mem raised enough that ORDER BY ts DESC sorts (feature_store's
    # own hot query) don't spill to disk under concurrent load.
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=2GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
    ports:
      # Host port 5433: many machines run a native PostgreSQL on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantstack"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        # Model registry provenance (data foundation audit 2026-07-17) --
        # set GIT_COMMIT=$(git rev-parse HEAD) before `docker compose up
        # --build` (VERIFY-COOKBOOK.md §10) so Settings.git_commit reflects
        # what's actually running. "unknown" (Dockerfile's own ARG default)
        # if unset, e.g. local dev without exporting it first.
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://quantstack:${POSTGRES_PASSWORD:-quantstack}@postgres:5432/quantstack
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./data:/repo/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
