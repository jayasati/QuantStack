name: quantstack

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quantstack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantstack}
      POSTGRES_DB: quantstack
    ports:
      # Host port 5433: many machines run a native PostgreSQL on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantstack"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://quantstack:${POSTGRES_PASSWORD:-quantstack}@postgres:5432/quantstack
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    volumes:
      - ./data:/repo/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
