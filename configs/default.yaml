# Default configuration — lowest priority.
# Overridden by .env, which is overridden by real environment variables.
app_name: QuantStack
environment: development
database_url: postgresql+asyncpg://quantstack:quantstack@localhost:5433/quantstack
redis_url: redis://localhost:6379/0
log_level: INFO
max_retry: 3
cache_timeout: 300
rate_limits:
  angel_one_per_second: 3
  telegram_per_minute: 20

# Secrets have no defaults on purpose — set them in .env or the environment:
# angel_one_api_key, angel_one_client_id, angel_one_pin, telegram_token, openai_key
watchlist:
  - NIFTY
  - BANKNIFTY
  - SENSEX
  - RELIANCE
  - HDFCBANK
  - INFY
enable_websocket: true

# Feature engineering (Volume 3)
feature_windows: [5, 10, 20, 50, 100, 200]
feature_timeframes: ["D"]
feature_benchmark_symbol: NIFTY
feature_engine_interval: 300
feature_candle_lookback: 500
feature_normalization_window: 100
feature_vix_symbol: INDIAVIX
feature_quote_lookback: 500
feature_reference_order_qty: 1000
feature_options_lookback: 5000
feature_breadth_lookback: 8000
feature_sector_lookback: 8000
feature_stock_sectors:
  RELIANCE: Energy
  HDFCBANK: Banking
  INFY: IT
feature_stock_industries: {}
feature_sensex_symbol: SENSEX
feature_structure_fractal: 2
feature_intraday_timeframe: 5m
feature_news_lookback: 5000
feature_events_lookback: 5000
feature_health_interval: 21600
feature_expiry_weekday: 1
feature_budget_window_days: 5
feature_market_holidays:
  - "2026-01-26"
  - "2026-03-04"
  - "2026-04-03"
  - "2026-04-14"
  - "2026-05-01"
  - "2026-08-15"
  - "2026-10-02"
  - "2026-11-09"
  - "2026-11-10"
  - "2026-12-25"
