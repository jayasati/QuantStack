# Default configuration — lowest priority.
# Overridden by .env, which is overridden by real environment variables.
app_name: QuantStack
environment: development
database_url: postgresql+asyncpg://quantstack:quantstack@localhost:5433/quantstack
redis_url: redis://localhost:6379/0
log_level: INFO
max_retry: 3
cache_timeout: 300
rate_limits:
  angel_one_per_second: 3
  telegram_per_minute: 20

# Secrets have no defaults on purpose — set them in .env or the environment:
# angel_one_api_key, angel_one_client_id, angel_one_pin, telegram_token, openai_key
watchlist:
  - NIFTY
  - BANKNIFTY
  - RELIANCE
  - HDFCBANK
  - INFY
enable_websocket: true

# Feature engineering (Volume 3)
feature_windows: [5, 10, 20, 50, 100, 200]
feature_timeframes: ["D"]
feature_benchmark_symbol: NIFTY
feature_engine_interval: 300
feature_candle_lookback: 500
feature_normalization_window: 100
feature_vix_symbol: INDIAVIX
feature_quote_lookback: 500
feature_reference_order_qty: 1000
