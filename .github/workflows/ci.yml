name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "configs/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "configs/**"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quantstack
          POSTGRES_PASSWORD: quantstack
          POSTGRES_DB: quantstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantstack"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend
        run: pip install -e "backend[dev]"

      - name: Lint (ruff)
        run: ruff check backend

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app

      - name: Validate migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://quantstack:quantstack@localhost:5432/quantstack
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://quantstack:quantstack@localhost:5432/quantstack
          REDIS_URL: redis://localhost:6379/0
        run: pytest -v

      - name: Build Docker image
        run: docker build -f docker/Dockerfile.backend -t quantstack-backend:ci .
