name: Backend tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quantstack
          POSTGRES_PASSWORD: quantstack
          POSTGRES_DB: quantstack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quantstack"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://quantstack:quantstack@localhost:5432/quantstack_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend package (dev extras)
        working-directory: backend
        run: python -m pip install -e ".[dev]"

      - name: Apply Alembic migrations to the test database
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://quantstack:quantstack@localhost:5432/quantstack_test
        run: alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        run: |
          python -m pytest app/tests -q \
            --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
