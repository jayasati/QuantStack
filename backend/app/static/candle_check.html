<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Candle Fetch Check</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
  :root {
    --surface-1:      #fcfcfb;
    --page-plane:     #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --accent:         #2a78d6;
    --up:             #0ca30c;
    --down:           #e34948;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1:      #1a1a19;
      --page-plane:     #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --accent:         #3987e5;
      --up:             #0ca30c;
      --down:           #e66767;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--page-plane); color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 16px;
  }
  .wrap { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 16px; margin: 0 0 12px; font-weight: 700; }
  .bar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 10px;
  }
  .bar label {
    font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: .03em; margin-right: 2px;
  }
  select {
    font: inherit; font-size: 13px; padding: 6px 10px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--page-plane); color: var(--text-primary);
  }
  .toggle-group { display: flex; gap: 4px; }
  .toggle-group button {
    font: inherit; font-size: 12px; padding: 6px 11px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--page-plane); color: var(--text-secondary);
    cursor: pointer;
  }
  .toggle-group button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toggle-group button:disabled { opacity: .35; cursor: not-allowed; }
  .spacer { flex: 1 1 auto; }
  #refresh {
    font: inherit; font-size: 12px; padding: 6px 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--page-plane); color: var(--text-secondary);
    cursor: pointer;
  }
  #status {
    font-size: 12px; color: var(--text-muted); padding: 2px 4px 10px;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  #status .ok { color: var(--up); }
  #status .empty { color: var(--down); }
  #chart-card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px; position: relative;
  }
  #chart { width: 100%; height: 480px; }
  #empty-msg {
    position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 13px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Candle Fetch Check</h1>

  <div class="bar">
    <label>Symbol</label>
    <select id="symbol"></select>

    <label style="margin-left:10px">Range</label>
    <div class="toggle-group" id="range-group"></div>

    <label style="margin-left:10px">Interval</label>
    <div class="toggle-group" id="interval-group"></div>

    <div class="spacer"></div>
    <button id="refresh">Refresh</button>
  </div>

  <div id="status"></div>

  <div id="chart-card">
    <div id="chart"></div>
    <div id="empty-msg">No candles stored for this symbol / interval / range yet.</div>
  </div>
</div>

<script>
const RANGES = [
  { key: '1d', label: '1D', days: 1,   intervals: ['1m', '3m', '5m'] },
  { key: '1w', label: '1W', days: 7,   intervals: ['5m', '15m', '30m'] },
  { key: '1mo', label: '1M', days: 30,  intervals: ['30m', '1H', 'D'] },
  { key: '2mo', label: '2M', days: 60,  intervals: ['1H', 'D'] },
  { key: '6mo', label: '6M', days: 180, intervals: ['D'] },
  { key: '1y', label: '1Y', days: 365, intervals: ['D'] },
  { key: '2y', label: '2Y', days: 730, intervals: ['D'] },
];

let state = { symbol: null, rangeKey: '1d', interval: '1m' };

const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  layout: {
    background: { color: 'transparent' },
    textColor: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary'),
  },
  grid: {
    vertLines: { color: getComputedStyle(document.documentElement).getPropertyValue('--gridline') },
    horzLines: { color: getComputedStyle(document.documentElement).getPropertyValue('--gridline') },
  },
  timeScale: { timeVisible: true, secondsVisible: false },
  rightPriceScale: { borderVisible: false },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
});

const candleSeries = chart.addCandlestickSeries({
  upColor: '#0ca30c', downColor: '#e34948', borderVisible: false,
  wickUpColor: '#0ca30c', wickDownColor: '#e34948',
});
const volumeSeries = chart.addHistogramSeries({
  priceFormat: { type: 'volume' },
  priceScaleId: 'volume',
});
volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.82, bottom: 0 } });

new ResizeObserver(entries => {
  const { width } = entries[0].contentRect;
  chart.applyOptions({ width });
}).observe(document.getElementById('chart-card'));

function renderRangeToggle() {
  const el = document.getElementById('range-group');
  el.innerHTML = '';
  for (const r of RANGES) {
    const btn = document.createElement('button');
    btn.textContent = r.label;
    btn.className = r.key === state.rangeKey ? 'active' : '';
    btn.onclick = () => {
      state.rangeKey = r.key;
      const range = RANGES.find(x => x.key === r.key);
      if (!range.intervals.includes(state.interval)) {
        state.interval = range.intervals[0];
      }
      renderRangeToggle();
      renderIntervalToggle();
      load();
    };
    el.appendChild(btn);
  }
}

function renderIntervalToggle() {
  const el = document.getElementById('interval-group');
  const range = RANGES.find(x => x.key === state.rangeKey);
  el.innerHTML = '';
  for (const iv of range.intervals) {
    const btn = document.createElement('button');
    btn.textContent = iv;
    btn.className = iv === state.interval ? 'active' : '';
    btn.onclick = () => {
      state.interval = iv;
      renderIntervalToggle();
      load();
    };
    el.appendChild(btn);
  }
}

async function loadSymbols() {
  const res = await fetch('/dashboard/candles/symbols');
  const symbols = await res.json();
  const select = document.getElementById('symbol');
  select.innerHTML = symbols.map(s => `<option value="${s}">${s}</option>`).join('');
  state.symbol = symbols[0];
  select.onchange = () => { state.symbol = select.value; load(); };
}

function setStatus(html) {
  document.getElementById('status').innerHTML = html;
}

async function load() {
  if (!state.symbol) return;
  const range = RANGES.find(x => x.key === state.rangeKey);
  setStatus('loading&hellip;');
  const started = performance.now();
  const url = `/dashboard/candles/data?symbol=${encodeURIComponent(state.symbol)}&interval=${encodeURIComponent(state.interval)}&days=${range.days}`;
  let data;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (err) {
    setStatus(`<span class="empty">fetch failed: ${err}</span>`);
    return;
  }
  const elapsed = Math.round(performance.now() - started);
  const emptyMsg = document.getElementById('empty-msg');

  if (!data.candles.length) {
    candleSeries.setData([]);
    volumeSeries.setData([]);
    emptyMsg.style.display = 'flex';
    setStatus(`<span class="empty">0 candles</span> &middot; ${state.symbol} &middot; ${state.interval} &middot; last ${range.days}d &middot; ${elapsed}ms`);
    return;
  }
  emptyMsg.style.display = 'none';

  // Lightweight Charts renders its time axis using the VIEWER's browser
  // timezone, not the exchange's -- on a UTC-clocked machine, 09:15 IST
  // market open (03:45 UTC) would show up on the axis as "03:45". The
  // standard workaround: shift every timestamp by IST's fixed UTC+5:30
  // offset before handing it to the library, so its (browser-timezone)
  // rendering happens to land on real IST wall-clock values. Only the
  // chart series need this -- the status line below computes IST directly
  // via toLocaleString(timeZone: 'Asia/Kolkata') on the true epoch.
  const IST_OFFSET_SECONDS = 19800; // UTC+5:30, no DST in India
  candleSeries.setData(data.candles.map(c => ({
    time: c.time + IST_OFFSET_SECONDS, open: c.open, high: c.high, low: c.low, close: c.close,
  })));
  volumeSeries.setData(data.candles.map(c => ({
    time: c.time + IST_OFFSET_SECONDS, value: c.volume,
    color: c.close >= c.open ? 'rgba(12,163,12,0.5)' : 'rgba(227,73,73,0.5)',
  })));
  chart.timeScale().fitContent();

  const last = data.candles[data.candles.length - 1];
  const lastTime = new Date(last.time * 1000).toLocaleString('en-IN', {
    timeZone: 'Asia/Kolkata', dateStyle: 'medium', timeStyle: 'short',
  });
  setStatus(
    `<span class="ok">${data.count} candles</span> &middot; ${state.symbol} &middot; ${state.interval} &middot; last ${range.days}d ` +
    `&middot; latest bar ${lastTime} IST &middot; close ${last.close} &middot; ${elapsed}ms`
  );
}

document.getElementById('refresh').onclick = load;

(async function init() {
  renderRangeToggle();
  renderIntervalToggle();
  await loadSymbols();
  await load();
})();
</script>
</body>
</html>
